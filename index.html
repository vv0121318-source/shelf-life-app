<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

// ---- Tiny inline icon set (no external icon library needed) ----
const iconProps = (size) => ({ width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" });
const IconCalculator = ({ size = 14 }) => (<svg {...iconProps(size)}><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="11" x2="8" y2="11"/><line x1="12" y1="11" x2="12" y2="11"/><line x1="16" y1="11" x2="16" y2="11"/><line x1="8" y1="15" x2="8" y2="15"/><line x1="12" y1="15" x2="12" y2="15"/><line x1="16" y1="15" x2="16" y2="19"/><line x1="8" y1="19" x2="12" y2="19"/></svg>);
const IconHistory = ({ size = 14 }) => (<svg {...iconProps(size)}><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>);
const IconCamera = ({ size = 14 }) => (<svg {...iconProps(size)}><path d="M4 8h3l2-2h6l2 2h3v11H4z"/><circle cx="12" cy="13.5" r="3.5"/></svg>);
const IconSheet = ({ size = 14 }) => (<svg {...iconProps(size)}><rect x="4" y="3" width="16" height="18" rx="1"/><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="14" x2="20" y2="14"/><line x1="9" y1="9" x2="9" y2="21"/></svg>);
const IconPrinter = ({ size = 14 }) => (<svg {...iconProps(size)}><rect x="5" y="8" width="14" height="8" rx="1"/><path d="M7 8V3h10v5"/><path d="M7 17v4h10v-4"/></svg>);
const IconTrash = ({ size = 15 }) => (<svg {...iconProps(size)}><line x1="4" y1="7" x2="20" y2="7"/><path d="M6 7l1 14h10l1-14"/><path d="M9 7V4h6v3"/></svg>);
const IconX = ({ size = 18 }) => (<svg {...iconProps(size)}><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>);
const IconSearch = ({ size = 14 }) => (<svg {...iconProps(size)}><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>);
const IconAlert = ({ size = 28 }) => (<svg {...iconProps(size)}><path d="M12 3l10 18H2z"/><line x1="12" y1="10" x2="12" y2="14"/><line x1="12" y1="17" x2="12" y2="17"/></svg>);
const IconScan = ({ size = 16 }) => (<svg {...iconProps(size)}><path d="M4 8V5a1 1 0 011-1h3"/><path d="M20 8V5a1 1 0 00-1-1h-3"/><path d="M4 16v3a1 1 0 001 1h3"/><path d="M20 16v3a1 1 0 01-1 1h-3"/><line x1="4" y1="12" x2="20" y2="12"/></svg>);

// ---- Design tokens ----
const STATUS = {
  fresh:          { label: "Fresh",                dot: "#2F9E44", ring: "#2F9E44", bg: "#EAF6EC" },
  good:           { label: "Good",                 dot: "#37B24D", ring: "#37B24D", bg: "#EDF8EE" },
  monitor:        { label: "Monitor",               dot: "#F0B429", ring: "#F0B429", bg: "#FDF6E3" },
  floor:          { label: "Move to Floor",         dot: "#E8590C", ring: "#E8590C", bg: "#FBEBE2" },
  critical:       { label: "Critical / Priority Sale", dot: "#E03131", ring: "#E03131", bg: "#FBE4E4" },
  pastSellBefore: { label: "Past Sell Before Date", dot: "#7A1F3D", ring: "#7A1F3D", bg: "#F3E3EA" },
  expired:        { label: "Expired",               dot: "#2B2B2B", ring: "#2B2B2B", bg: "#E7E5E1" },
};

const RECS = {
  fresh: "Continue normal sale. No action needed.",
  good: "Continue normal sale. Check again on next stock round.",
  monitor: "Monitor closely — prioritize this batch in the next sale cycle.",
  floor: "Move to shop floor / eye-level display to accelerate sale.",
  critical: "Urgent clearance. Apply markdown and prioritize immediate sale.",
  pastSellBefore: "Pull from the sale shelf. Still usable, but past the sell-before window — redirect to staff use, donation, or write-off per policy.",
  expired: "Remove from shelf immediately. Do not sell or use.",
};

function fmt(d) {
  if (!d) return "—";
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}
function parseDateInput(s) {
  if (!s) return null;
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function daysBetween(a, b) {
  const MS = 24 * 60 * 60 * 1000;
  const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((B - A) / MS);
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function clampPercent(pct) { if (pct > 100) return 100; if (pct < 0) return 0; return pct; }
function statusKeyForPercent(roundedPct, isExpired) {
  if (isExpired) return "expired";
  if (roundedPct <= 0) return "pastSellBefore";
  if (roundedPct <= 19) return "critical";
  if (roundedPct <= 39) return "floor";
  if (roundedPct <= 59) return "monitor";
  if (roundedPct <= 79) return "good";
  return "fresh";
}
function computeResult(mfg, exp, today) {
  const totalShelfLifeDays = daysBetween(mfg, exp);
  const policyMonths = Math.ceil(totalShelfLifeDays / 30);
  const subtractDays = policyMonths * 3;
  const sellBeforeDate = addDays(exp, -subtractDays);
  const daysToExpiry = daysBetween(today, exp);
  const daysLeftToSell = daysBetween(today, sellBeforeDate);
  const totalSellableLife = daysBetween(mfg, sellBeforeDate);
  const rawPercent = totalSellableLife > 0 ? (daysLeftToSell / totalSellableLife) * 100 : 0;
  const shelfLifePercent = clampPercent(rawPercent);
  const roundedPercent = Math.round(shelfLifePercent);
  const isExpired = daysToExpiry < 0;
  const statusKey = statusKeyForPercent(roundedPercent, isExpired);
  return { mfg, exp, today, totalShelfLifeDays, policyMonths, subtractDays, sellBeforeDate, daysToExpiry, daysLeftToSell, shelfLifePercent, statusKey };
}

// ---- Storage (localStorage — this file runs standalone in your own browser) ----
async function loadEntries() {
  try { const raw = localStorage.getItem("shelf-life-entries"); return raw ? JSON.parse(raw) : []; }
  catch (e) { return []; }
}
async function persistEntries(arr) {
  try { localStorage.setItem("shelf-life-entries", JSON.stringify(arr)); }
  catch (e) { console.error("Storage error:", e); }
}

function Gauge({ percent, color }) {
  const clamped = Math.max(0, Math.min(100, percent));
  const r = 78, cx = 90, cy = 90;
  const circumference = Math.PI * r;
  const dash = (clamped / 100) * circumference;
  const angle = 180 - (clamped / 100) * 180;
  const rad = (angle * Math.PI) / 180;
  const nx = cx + (r - 14) * Math.cos(rad);
  const ny = cy - (r - 14) * Math.sin(rad);
  return (
    <svg width="180" height="112" viewBox="0 0 180 112" className="overflow-visible">
      <path d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`} fill="none" stroke="#D9D4C6" strokeWidth="14" strokeLinecap="round" />
      <path d={`M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy}`} fill="none" stroke={color} strokeWidth="14" strokeLinecap="round"
        strokeDasharray={`${dash} ${circumference}`} style={{ transition: "stroke-dasharray 500ms ease, stroke 300ms ease" }} />
      <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="#1F2422" strokeWidth="2.5" strokeLinecap="round" style={{ transition: "all 500ms ease" }} />
      <circle cx={cx} cy={cy} r="4.5" fill="#1F2422" />
    </svg>
  );
}
function Ticket({ children, title }) {
  return (
    <div className="relative bg-[#F2EFE6] border border-[#D9D4C6]">
      <div className="px-5 pt-4 pb-1"><span className="text-[10px] tracking-[0.22em] font-semibold text-[#7C8B96] uppercase font-mono">{title}</span></div>
      <div className="px-5 pb-5">{children}</div>
    </div>
  );
}
function Row({ label, value, mono = true, strong = false }) {
  return (
    <div className="flex items-baseline justify-between py-1.5 border-b border-dashed border-[#D9D4C6] last:border-b-0">
      <span className="text-[13px] text-[#5B6660] font-sans">{label}</span>
      <span className={`${mono ? "font-mono" : "font-sans"} ${strong ? "text-[15px] font-semibold" : "text-[13.5px]"} text-[#1F2422] tabular-nums text-right`}>{value}</span>
    </div>
  );
}
function Perforation() {
  return (
    <div className="flex items-center gap-[6px] my-0 py-2 px-5 bg-[#EAE6DA] no-print">
      {Array.from({ length: 40 }).map((_, i) => (<span key={i} className="w-[3px] h-[3px] rounded-full bg-[#C6C0AF] flex-shrink-0" />))}
    </div>
  );
}
function StatusPill({ statusKey }) {
  const s = STATUS[statusKey];
  return (
    <div className="flex items-center gap-2 px-3 py-2" style={{ backgroundColor: s.bg }}>
      <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: s.dot }} />
      <span className="font-display font-700 text-[13px] text-[#1F2422] uppercase tracking-wide">{s.label}</span>
    </div>
  );
}

function ScannerModal({ onDetect, onClose }) {
  const videoRef = useRef(null);
  const readerRef = useRef(null);
  const [status, setStatus] = useState("loading");
  const [errorMsg, setErrorMsg] = useState("");

  useEffect(() => {
    let cancelled = false;
    function loadZXing() {
      return new Promise((resolve, reject) => {
        if (window.ZXing) return resolve(window.ZXing);
        const existing = document.querySelector('script[data-zxing="1"]');
        if (existing) { existing.addEventListener("load", () => resolve(window.ZXing)); existing.addEventListener("error", reject); return; }
        const script = document.createElement("script");
        script.src = "https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js";
        script.async = true; script.dataset.zxing = "1";
        script.onload = () => resolve(window.ZXing);
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }
    async function start() {
      try {
        const ZXing = await loadZXing();
        if (cancelled) return;
        const codeReader = new ZXing.BrowserMultiFormatReader();
        readerRef.current = codeReader;
        setStatus("scanning");
        codeReader.decodeFromVideoDevice(null, videoRef.current, (result) => {
          if (cancelled) return;
          if (result) onDetect(result.getText());
        });
      } catch (e) {
        if (!cancelled) { setStatus("error"); setErrorMsg("Couldn't start the scanner (camera permission, or the page isn't served over https/localhost). Enter details manually instead."); }
      }
    }
    start();
    return () => { cancelled = true; try { readerRef.current && readerRef.current.reset(); } catch (e) {} };
  }, [onDetect]);

  return (
    <div className="fixed inset-0 z-50 bg-black/70 flex items-center justify-center p-4">
      <div className="bg-[#F2EFE6] border border-[#D9D4C6] w-full max-w-[380px] p-4">
        <div className="flex items-center justify-between mb-3">
          <span className="font-display font-700 text-[13px] uppercase tracking-wide text-[#1F2422] flex items-center gap-2"><IconScan size={16} /> Scan Barcode / QR</span>
          <button onClick={onClose} className="text-[#5B6660] hover:text-[#1F2422]"><IconX size={18} /></button>
        </div>
        {status !== "error" ? (
          <div className="relative bg-black aspect-square overflow-hidden">
            <video ref={videoRef} className="w-full h-full object-cover" muted playsInline />
            <div className="absolute inset-8 border-2 border-[#F0B429]/80 pointer-events-none" />
            {status === "loading" && <p className="absolute inset-0 flex items-center justify-center text-white font-sans text-[12px]">Starting camera…</p>}
          </div>
        ) : (
          <div className="flex flex-col items-center gap-3 py-8 text-center">
            <div className="text-[#E8590C]"><IconAlert size={28} /></div>
            <p className="font-sans text-[12.5px] text-[#5B6660]">{errorMsg}</p>
          </div>
        )}
        <p className="font-sans text-[11px] text-[#7C8B96] mt-3">
          Point the camera at a code that encodes the batch details, e.g. <span className="font-mono">NAME:Milk 1L;MFG:2026-07-08;EXP:2026-07-31</span>. Plain text codes fill in the product name only.
        </p>
      </div>
    </div>
  );
}

function ShelfLifePro() {
  const [tab, setTab] = useState("calculate");
  const [productName, setProductName] = useState("");
  const [mfgInput, setMfgInput] = useState("");
  const [expInput, setExpInput] = useState("");
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [showScanner, setShowScanner] = useState(false);
  const [entries, setEntries] = useState([]);
  const [entriesLoaded, setEntriesLoaded] = useState(false);
  const [search, setSearch] = useState("");

  useEffect(() => { loadEntries().then((e) => { setEntries(e); setEntriesLoaded(true); }); }, []);

  const saveEntry = useCallback((name, mfg, exp) => {
    setEntries((prev) => {
      const last = prev[0];
      if (last && last.name === (name || "Unnamed batch") && last.mfg === mfg && last.exp === exp) return prev;
      const entry = { id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`, name: name || "Unnamed batch", mfg, exp, savedAt: new Date().toISOString() };
      const updated = [entry, ...prev];
      persistEntries(updated);
      return updated;
    });
  }, []);

  function handleCalculate() {
    setError(""); setResult(null);
    if (!mfgInput || !expInput) { setError("Select both a manufacture date and an expiry date."); return; }
    const mfg = parseDateInput(mfgInput); const exp = parseDateInput(expInput);
    if (exp <= mfg) { setError("Expiry date must be after the manufacture date."); return; }
    const res = computeResult(mfg, exp, new Date());
    setResult(res);
    saveEntry(productName.trim(), mfgInput, expInput);
  }

  function deleteEntry(id) {
    setEntries((prev) => { const updated = prev.filter((e) => e.id !== id); persistEntries(updated); return updated; });
  }

  function openEntry(entry) {
    setProductName(entry.name === "Unnamed batch" ? "" : entry.name);
    setMfgInput(entry.mfg); setExpInput(entry.exp);
    setResult(computeResult(parseDateInput(entry.mfg), parseDateInput(entry.exp), new Date()));
    setTab("calculate");
  }

  function handleScanDetect(text) {
    setShowScanner(false);
    const parts = {};
    text.split(";").forEach((chunk) => { const [k, ...rest] = chunk.split(":"); if (k && rest.length) parts[k.trim().toUpperCase()] = rest.join(":").trim(); });
    if (parts.NAME) setProductName(parts.NAME);
    if (parts.MFG && /^\d{4}-\d{2}-\d{2}$/.test(parts.MFG)) setMfgInput(parts.MFG);
    if (parts.EXP && /^\d{4}-\d{2}-\d{2}$/.test(parts.EXP)) setExpInput(parts.EXP);
    if (!parts.NAME && !parts.MFG && !parts.EXP) setProductName(text.trim());
  }

  function exportResultToExcel() {
    if (!result) return;
    const sLabel = STATUS[result.statusKey].label;
    const row = { Product: productName || "Unnamed batch", "MFG Date": fmt(result.mfg), "EXP Date": fmt(result.exp), "Total Shelf Life (days)": result.totalShelfLifeDays, "Policy Months": result.policyMonths, "Buffer (days)": result.subtractDays, "Sell Before Date": fmt(result.sellBeforeDate), "Today": fmt(result.today), "Days to Expiry": result.daysToExpiry, "Days Left to Sell": result.daysLeftToSell, "Shelf Life %": `${result.shelfLifePercent.toFixed(0)}%`, Status: sLabel, Recommendation: RECS[result.statusKey] };
    const ws = XLSX.utils.json_to_sheet([row]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Batch");
    XLSX.writeFile(wb, `shelf-life-${(productName || "batch").replace(/\s+/g, "_")}.xlsx`);
  }

  function exportHistoryToExcel() {
    if (entries.length === 0) return;
    const rows = entries.map((e) => {
      const r = computeResult(parseDateInput(e.mfg), parseDateInput(e.exp), new Date());
      return { Product: e.name, "MFG Date": fmt(r.mfg), "EXP Date": fmt(r.exp), "Total Shelf Life (days)": r.totalShelfLifeDays, "Sell Before Date": fmt(r.sellBeforeDate), "Days Left to Sell": r.daysLeftToSell, "Shelf Life %": `${r.shelfLifePercent.toFixed(0)}%`, Status: STATUS[r.statusKey].label, "Saved At": new Date(e.savedAt).toLocaleString("en-GB") };
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "History");
    XLSX.writeFile(wb, "shelf-life-history.xlsx");
  }

  const s = result ? STATUS[result.statusKey] : null;
  const filteredEntries = entries.filter((e) => {
    if (!search.trim()) return true;
    const q = search.trim().toLowerCase();
    return e.name.toLowerCase().includes(q) || e.mfg.includes(q) || e.exp.includes(q);
  });

  return (
    <div className="min-h-screen bg-[#EAE6DA] flex flex-col items-center py-10 px-4">
      <div className="w-full max-w-[420px]">
        <div className="flex items-center justify-between mb-5 px-1 no-print">
          <div>
            <h1 className="font-display font-800 text-[22px] tracking-tight text-[#1F2422] leading-none">SHELF&nbsp;LIFE&nbsp;PRO</h1>
            <p className="font-sans text-[11.5px] text-[#5B6660] mt-1">Batch freshness &amp; clearance tracker</p>
          </div>
          <div className="border-2 border-[#1F2422] rounded-full w-11 h-11 flex items-center justify-center rotate-[-8deg]">
            <span className="font-mono text-[9px] font-bold text-[#1F2422] leading-tight text-center">QC</span>
          </div>
        </div>

        <div className="flex mb-4 border border-[#1F2422] no-print">
          <button onClick={() => setTab("calculate")} className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 font-display font-700 text-[12px] uppercase tracking-wide transition-colors ${tab === "calculate" ? "bg-[#1F2422] text-[#EAE6DA]" : "bg-transparent text-[#1F2422] hover:bg-[#1F2422]/5"}`}>
            <IconCalculator size={14} /> Calculate
          </button>
          <button onClick={() => setTab("history")} className={`flex-1 flex items-center justify-center gap-1.5 py-2.5 font-display font-700 text-[12px] uppercase tracking-wide border-l border-[#1F2422] transition-colors ${tab === "history" ? "bg-[#1F2422] text-[#EAE6DA]" : "bg-transparent text-[#1F2422] hover:bg-[#1F2422]/5"}`}>
            <IconHistory size={14} /> History{entries.length > 0 ? ` (${entries.length})` : ""}
          </button>
        </div>

        {tab === "calculate" && (
          <>
            <div className="bg-white border border-[#D9D4C6] px-5 py-5 mb-4 shadow-[0_1px_0_#D9D4C6] no-print">
              <label className="flex flex-col gap-1 mb-3">
                <span className="text-[10px] tracking-[0.15em] uppercase font-semibold text-[#7C8B96] font-mono">Product Name / SKU (optional)</span>
                <input type="text" value={productName} onChange={(e) => setProductName(e.target.value)} placeholder="e.g. Milk 1L"
                  className="font-sans text-[13px] border border-[#D9D4C6] px-2 py-2 text-[#1F2422] focus:outline-none focus:ring-2 focus:ring-[#3B5166] bg-[#F9F8F4]" />
              </label>
              <div className="grid grid-cols-2 gap-3 mb-3">
                <label className="flex flex-col gap-1">
                  <span className="text-[10px] tracking-[0.15em] uppercase font-semibold text-[#7C8B96] font-mono">MFG Date</span>
                  <input type="date" value={mfgInput} onChange={(e) => setMfgInput(e.target.value)}
                    className="font-mono text-[13px] border border-[#D9D4C6] px-2 py-2 text-[#1F2422] focus:outline-none focus:ring-2 focus:ring-[#3B5166] bg-[#F9F8F4]" />
                </label>
                <label className="flex flex-col gap-1">
                  <span className="text-[10px] tracking-[0.15em] uppercase font-semibold text-[#7C8B96] font-mono">EXP Date</span>
                  <input type="date" value={expInput} onChange={(e) => setExpInput(e.target.value)}
                    className="font-mono text-[13px] border border-[#D9D4C6] px-2 py-2 text-[#1F2422] focus:outline-none focus:ring-2 focus:ring-[#3B5166] bg-[#F9F8F4]" />
                </label>
              </div>
              <button onClick={() => setShowScanner(true)} className="w-full flex items-center justify-center gap-2 font-display font-700 text-[12px] tracking-[0.08em] uppercase border border-[#1F2422] text-[#1F2422] py-2 mb-3 hover:bg-[#1F2422]/5 transition-colors">
                <IconCamera size={14} /> Scan Barcode / QR
              </button>
              <button onClick={handleCalculate} className="w-full font-display font-700 text-[13px] tracking-[0.1em] uppercase bg-[#1F2422] text-[#EAE6DA] py-2.5 hover:bg-[#3B5166] transition-colors">Calculate</button>
              {error && <p className="font-sans text-[12px] text-[#E03131] mt-3">{error}</p>}
            </div>

            {result && (
              <>
                <div className="flex gap-2 mb-3 no-print">
                  <button onClick={exportResultToExcel} className="flex-1 flex items-center justify-center gap-1.5 font-sans text-[11.5px] border border-[#D9D4C6] bg-white text-[#3B5166] py-2 hover:border-[#3B5166] transition-colors"><IconSheet size={14} /> Excel</button>
                  <button onClick={() => window.print()} className="flex-1 flex items-center justify-center gap-1.5 font-sans text-[11.5px] border border-[#D9D4C6] bg-white text-[#3B5166] py-2 hover:border-[#3B5166] transition-colors"><IconPrinter size={14} /> PDF</button>
                </div>
                <div className="border border-[#D9D4C6]">
                  <Ticket title="Product Info">
                    {productName && <Row label="Product" value={productName} mono={false} strong />}
                    <Row label="MFG Date" value={fmt(result.mfg)} />
                    <Row label="EXP Date" value={fmt(result.exp)} />
                    <Row label="Total Shelf Life" value={`${result.totalShelfLifeDays} days (${result.policyMonths}-month policy)`} />
                  </Ticket>
                  <Perforation />
                  <Ticket title="Current Status">
                    <Row label="Today's Date" value={fmt(result.today)} />
                    <Row label="Days to Expiry" value={result.daysToExpiry >= 0 ? `${result.daysToExpiry} days` : `Expired ${Math.abs(result.daysToExpiry)} days ago`} strong />
                  </Ticket>
                  <Perforation />
                  <Ticket title="Action Required">
                    <Row label="Sell Before Date" value={fmt(result.sellBeforeDate)} />
                    <Row label="Days Left to Sell" value={result.daysLeftToSell >= 0 ? `${result.daysLeftToSell} days` : `Overdue ${Math.abs(result.daysLeftToSell)} days`} strong />
                    <div className="flex flex-col items-center pt-3 pb-1">
                      <Gauge percent={result.shelfLifePercent} color={s.ring} />
                      <div className="text-center -mt-2">
                        <span className="font-mono text-[26px] font-semibold text-[#1F2422] leading-none">{result.shelfLifePercent.toFixed(0)}%</span>
                        <p className="font-sans text-[10px] tracking-[0.15em] uppercase text-[#7C8B96] mt-0.5">Sellable Life Remaining</p>
                      </div>
                    </div>
                    <div className="mt-3 mb-3"><StatusPill statusKey={result.statusKey} /></div>
                    <p className="font-sans text-[12.5px] text-[#3B5166] leading-snug">{RECS[result.statusKey]}</p>
                  </Ticket>
                </div>
              </>
            )}

            {!result && !error && (
              <p className="font-sans text-[11.5px] text-[#7C8B96] text-center mt-6 px-4 no-print">Enter a manufacture and expiry date, then press Calculate to generate the batch's action report.</p>
            )}
            <p className="font-mono text-[9.5px] text-[#A8A296] text-center mt-6 tracking-wide no-print">SELL-BEFORE RULE — 3 DAYS BUFFER PER POLICY MONTH (1–30 DAYS = 1 MO, 31–60 = 2 MO...)</p>
          </>
        )}

        {tab === "history" && (
          <div className="no-print">
            <div className="flex gap-2 mb-3">
              <div className="flex-1 flex items-center gap-2 bg-white border border-[#D9D4C6] px-3 py-2">
                <IconSearch size={14} />
                <input type="text" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search by name or date…" className="font-sans text-[13px] text-[#1F2422] focus:outline-none w-full bg-transparent" />
              </div>
              <button onClick={exportHistoryToExcel} disabled={entries.length === 0} className="flex items-center justify-center gap-1.5 font-sans text-[11.5px] border border-[#D9D4C6] bg-white text-[#3B5166] px-3 py-2 hover:border-[#3B5166] transition-colors disabled:opacity-40">
                <IconSheet size={14} /> Export All
              </button>
            </div>
            {!entriesLoaded && <p className="font-sans text-[12px] text-[#7C8B96] text-center mt-8">Loading history…</p>}
            {entriesLoaded && filteredEntries.length === 0 && (
              <p className="font-sans text-[12px] text-[#7C8B96] text-center mt-8 px-4">{entries.length === 0 ? "No saved batches yet. Calculations are saved here automatically." : "No entries match your search."}</p>
            )}
            <div className="flex flex-col gap-2">
              {filteredEntries.map((entry) => {
                const r = computeResult(parseDateInput(entry.mfg), parseDateInput(entry.exp), new Date());
                const es = STATUS[r.statusKey];
                return (
                  <div key={entry.id} className="bg-[#F2EFE6] border border-[#D9D4C6] px-4 py-3">
                    <div className="flex items-start justify-between gap-2">
                      <button onClick={() => openEntry(entry)} className="text-left flex-1 min-w-0">
                        <p className="font-sans font-semibold text-[13px] text-[#1F2422] truncate">{entry.name}</p>
                        <p className="font-mono text-[11px] text-[#5B6660] mt-0.5">{fmt(parseDateInput(entry.mfg))} → {fmt(parseDateInput(entry.exp))}</p>
                        <div className="flex items-center gap-2 mt-2">
                          <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: es.dot }} />
                          <span className="font-display font-700 text-[10.5px] uppercase tracking-wide text-[#1F2422]">{es.label}</span>
                          <span className="font-mono text-[10.5px] text-[#7C8B96]">· {r.shelfLifePercent.toFixed(0)}%</span>
                        </div>
                      </button>
                      <button onClick={() => deleteEntry(entry.id)} className="text-[#A8A296] hover:text-[#E03131] transition-colors flex-shrink-0 p-1" aria-label="Delete entry"><IconTrash size={15} /></button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
      {showScanner && <ScannerModal onDetect={handleScanDetect} onClose={() => setShowScanner(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ShelfLifePro />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch(() => {});
  });
}

</script>
</body>
</html>
